front:
  text: 諸真論還丹訣
  hash: sha256:a7a9979bc8bc1f97e36cf54883f97e02b985c5787d77962beea69fcd979aa172
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0231_HFL_000-001a, image: hfl/0112/0112-100.png}
body:
  text: 玉壺頌十首房是靑龍參白虎日為朱雀月玄武欲知火藥立元基須得中央戊巳土青龍本自丹砂宅白虎元歸黑金客古仙名作神龍精淮南説之是秋石神水從來是汞神東方木德發陽春南來又是火中主學者尋之方契真龍虎相逢在母胎二精相合亂花開留心但逐初陽起至九方知道自媒陽極隂生甲午中巳拋六卦入乾宮神仙妙術此來久自是時人迷道風砂産於金汞在鉛神仙不許俗人傳不辭便説還丹術只恐天符責宿愆二氣推尋不暫停隂陽互用若神靈非論化物變凡質能滅千災與萬精古往今來事可嗟時光遷變換年華迷蹤失路悠悠甚不知將底作黃芽十月飛霜雪又濃黃芽內熟色顒顒修真但見黃芽熟安得不𢗭金虎龍服如麻粒清真氣凝靜凝心可隨意非論變化救孤貧從此長生應不死靑霞子讃金碧龍虎經青霞金碧言龍虎有名形體終難覩虎隱在龍宫龍行虎抱蹤一般求不錯兩種難尋度會取一如人性情不離身真鼎鍊丹先要修真鼎功夫到日方神聖凡物不相富全乖隂與陽沖和象一氣爭奈名同異南北路交差朦朧是一家讃魏伯陽參同契魏君三卷參同契於中一一言真諦子細説還丹還丹事不難制時何所似黃白如雞子小小一事中乾坤法象同明水火從來水火為樞轄一方王處多相殺真水與真陽一源難改張直須窮玄理易字形應是日月不相拋坎離兩位交明火候一陽生後為春夏一隂才至秋冬卦陽氣上升時隂雲暗下垂專須聽漏刻莫遣乖常則造化手中權身為壺裏客明至藥家家盡有長生藥人人取用皆差錯氣候似浮沉問君何處尋眼看猶不識手授無蹤迹大道不繁論靑龍白虎門容成公內丹歌訣始靑之下月與日始青者元氣也月屬隂以象下元日屬陽以象中元也兩半同升合為一靑氣元氣及津液為三合為一成珠也出彼玉池入金室玉池口也金室胎也津液與氣俱在氣海中結成珠如橘色黃也大如彈丸黃如橘胎因氣結氣因胎成珠也中有隹味甜如蜜胎氣既成珠如橘也氣海中每服氣存想以氣繞裏其珠也見之即口中華池自甜如蜜子若得之愼勿失胎結成珠見之愼勿與非道説若與婦人交接折此玄珠氷不結矣審能修之仙道畢精氣結即名曰內還丹其津液上下灌丹田頭上即有九宮即是九轉八瓊丹也修氣九年功成大道畢矣與天地齊也精為玉氣為金元屬玄珠以白氣裹玄珠入金室金室者肺也胎也氣海存三者心也大數三也曹聖圖鉛汞歌金有一箇身運用從南北知音雖數人盡住蓬萊側寰海無人過遇者還不識日月與五星並作雪遊客鄙夫若繼壽三曽超大厄志在傅一氣變化成金液金液通神仙須向五行覓五行處處有素非仙人惜要識真鉛汞一水還一石中宮先為主水火結為物二儀成夫婦夫婦相配匹百刻達離宫丹砂從此出亦如真珠狀丹砂本無赤見水歸水性見火成金液大聖名靈藥真人號寶術世間諸學士問著説金石金石是頑物焉得化金液脫胎除黑暈黑暈是鉛質元氣補元氣豈資凡砂石雄黃莫貴買朱砂不用覓水銀徒自誇不見有人得竹破用竹補木斷用木植人除氣補外萬物總為客若能窮水火名必列仙籍鉛汞有多名根源在五行若能修鍊者服餌得長生諸真論還丹訣終
